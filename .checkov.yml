# Checkov baseline for Opslora Terraform branch/apply pipeline hardening.
#
# These checks are currently accepted as baseline debt while the Azure platform is
# still in test/spin-up mode and costly runtime resources are intentionally paused.
# The workflow is restored to blocking with this baseline so new, non-baselined
# Checkov findings fail PRs while these known items are tracked separately.
#
# Revisit before production go-live and remove skips as controls are implemented.
skip-check:
  # AKS hardening backlog: disk encryption set, max pods policy, local admin/API ranges,
  # ephemeral OS disk, private cluster, upgrade channel, Azure Policy, host encryption,
  # and paid SLA tier vary by env/cost stage.
  - CKV_AZURE_117
  - CKV_AZURE_168
  - CKV_AZURE_141
  - CKV_AZURE_6
  - CKV_AZURE_226
  - CKV_AZURE_115
  - CKV_AZURE_171
  - CKV_AZURE_116
  - CKV_AZURE_227
  - CKV_AZURE_170

  # Application Gateway has HTTP listener for redirect/bootstrap and SSL policy is
  # handled in the module backlog before public prod exposure.
  - CKV_AZURE_217
  - CKV_AZURE_218

  # ACR is intentionally Standard/public during current CI/bootstrap. Private
  # endpoint, zone redundancy, quarantine/trust, retention, dedicated endpoints,
  # and geo-replication are production hardening backlog.
  - CKV_AZURE_165
  - CKV_AZURE_166
  - CKV_AZURE_167
  - CKV_AZURE_237
  - CKV_AZURE_233
  - CKV_AZURE_139
  - CKV_AZURE_164

  # Azure Firewall is Standard/cost-controlled during test; Premium IDPS deny and
  # deny intel mode are production hardening backlog.
  - CKV_AZURE_220
  - CKV_AZURE_216

  # Key Vault uses private endpoint and public access disabled; Checkov's firewall
  # rule check is retained as baseline debt until network ACL mode is revalidated.
  - CKV_AZURE_109

  # Test MySQL skips geo-redundant backups for cost. Private endpoint check does
  # not model delegated-subnet private access cleanly for Flexible Server.
  - CKV_AZURE_94
  - CKV2_AZURE_56

  # Subnet NSG strategy is still being finalized for hub/spoke, including Azure
  # reserved subnets where NSG association may be constrained.
  - CKV2_AZURE_31
