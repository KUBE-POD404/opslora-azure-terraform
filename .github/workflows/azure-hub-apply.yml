name: Azure Hub Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: 'Type apply-hub to run terraform apply for opslora-connectivity.'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-hub-apply
  cancel-in-progress: false

jobs:
  apply:
    if: ${{ inputs.confirm_apply == 'apply-hub' && github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_enable_governance_policy_assignments: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_HUB_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/hub
        run: terraform init

      - name: Terraform validate
        working-directory: environments/hub
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/hub
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: environments/hub
        shell: bash
        run: |
          set +e
          terraform apply -input=false -auto-approve tfplan -no-color 2>&1 | tee tfapply-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Hub Terraform Apply"
            echo
            echo '```text'
            tail -n 200 tfapply-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload apply artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hub-tfapply-${{ github.run_id }}
          path: environments/hub/tfapply-output.txt
          retention-days: 7
