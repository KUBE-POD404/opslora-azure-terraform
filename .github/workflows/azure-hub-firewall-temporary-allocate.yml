name: Azure Hub Firewall Temporary Allocate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type allocate-firewall to reallocate Azure Firewall after temporary deallocate."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-hub-firewall-temporary-allocate
  cancel-in-progress: false

jobs:
  allocate-firewall:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' && inputs.confirm == 'allocate-firewall' }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login hub
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_HUB_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}

      - name: Reallocate Azure Firewall IP configuration
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt >/dev/null

          firewall_rg="rg-opslora-hub-network-cin"
          firewall_name="fw-opslora-hub-cin-001"
          ipconfig_name="ipconfig"
          public_ip_rg="rg-opslora-hub-security-cin"
          public_ip_name="pip-opslora-fw-cin-001"
          vnet_rg="rg-opslora-hub-network-cin"
          vnet_name="vnet-opslora-hub-cin-001"

          echo "# Azure Hub Firewall Temporary Allocate"
          echo
          echo "This recreates the Azure Firewall IP configuration. The firewall private IP may change; rerun Terraform plan/apply if route table drift appears."
          echo

          echo "## Before"
          az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query '{name:name,provisioningState:provisioningState,ipConfigurationCount:length(ipConfigurations),ipConfigurations:ipConfigurations[].{name:name,privateIp:privateIPAddress}}' \
            -o json

          existing_count=$(az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query 'length(ipConfigurations)' \
            -o tsv)

          if [[ "${existing_count}" != "0" ]]; then
            echo "Firewall already has IP configuration(s); treating as already allocated."
          else
            public_ip_id=$(az network public-ip show \
              --resource-group "${public_ip_rg}" \
              --name "${public_ip_name}" \
              --query id \
              -o tsv)

            echo "## Allocating: creating IP configuration ${ipconfig_name}"
            az network firewall ip-config create \
              --resource-group "${firewall_rg}" \
              --firewall-name "${firewall_name}" \
              --name "${ipconfig_name}" \
              --public-ip-address "${public_ip_id}" \
              --vnet-name "${vnet_name}"
          fi

          echo "## Waiting for firewall update"
          az network firewall wait \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --updated \
            --timeout 1800

          echo "## After"
          az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query '{name:name,provisioningState:provisioningState,sku:sku,threatIntelMode:threatIntelMode,ipConfigurationCount:length(ipConfigurations),ipConfigurations:ipConfigurations[].{name:name,privateIp:privateIPAddress,subnetId:subnet.id,publicIpId:publicIPAddress.id}}' \
            -o json
