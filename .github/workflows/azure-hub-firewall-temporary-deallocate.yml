name: Azure Hub Firewall Temporary Deallocate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deallocate-firewall to deallocate Azure Firewall. This causes hub/spoke egress outage until reallocated."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-hub-firewall-temporary-deallocate
  cancel-in-progress: false

jobs:
  deallocate-firewall:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' && inputs.confirm == 'deallocate-firewall' }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login hub
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_HUB_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}

      - name: Deallocate Azure Firewall by removing IP configuration
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt >/dev/null

          firewall_rg="rg-opslora-hub-network-cin"
          firewall_name="fw-opslora-hub-cin-001"
          ipconfig_name="ipconfig"

          echo "# Azure Hub Firewall Temporary Deallocate"
          echo
          echo "This deallocates the Azure Firewall by deleting its IP configuration."
          echo "It does NOT delete the firewall resource, firewall policy, public IP, public IP prefix, or VNets."
          echo

          echo "## Before"
          az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query '{name:name,provisioningState:provisioningState,sku:sku,threatIntelMode:threatIntelMode,ipConfigurations:ipConfigurations[].{name:name,privateIp:privateIPAddress,subnetId:subnet.id,publicIpId:publicIPAddress.id}}' \
            -o json

          existing_count=$(az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query 'length(ipConfigurations)' \
            -o tsv)

          if [[ "${existing_count}" == "0" ]]; then
            echo "Firewall already has no IP configurations; treating as already deallocated."
          else
            echo "## Deallocating: deleting IP configuration ${ipconfig_name}"
            az network firewall ip-config delete \
              --resource-group "${firewall_rg}" \
              --firewall-name "${firewall_name}" \
              --name "${ipconfig_name}"
          fi

          echo "## Waiting for firewall update"
          az network firewall wait \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --updated \
            --timeout 1800

          echo "## After"
          az network firewall show \
            --resource-group "${firewall_rg}" \
            --name "${firewall_name}" \
            --query '{name:name,provisioningState:provisioningState,sku:sku,threatIntelMode:threatIntelMode,ipConfigurationCount:length(ipConfigurations),ipConfigurations:ipConfigurations}' \
            -o json
