name: Azure Hub Terraform Plan

on:
  pull_request:
    paths:
      - "environments/hub/**"
      - "modules/**"
      - ".github/workflows/azure-hub-plan.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-hub-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_HUB_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/hub
        run: terraform init

      - name: Terraform validate
        working-directory: environments/hub
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/hub
        run: terraform plan -input=false -out=tfplan

      - name: Save plan summary
        working-directory: environments/hub
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub-tfplan-${{ github.run_id }}
          path: |
            environments/hub/tfplan
            environments/hub/tfplan.txt
          retention-days: 7
