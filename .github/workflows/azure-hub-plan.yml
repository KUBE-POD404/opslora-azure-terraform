name: Azure Hub Terraform Plan

on:
  pull_request:
    branches:
      - hub
    paths:
      - "environments/hub/**"
      - "modules/**"
      - ".github/workflows/azure-hub-plan.yml"
      - ".github/workflows/terraform-pr-quality.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-hub-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/hub' }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce hub plan branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "hub" ]]; then
            echo "Hub plans are only allowed for PRs targeting hub." >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${GITHUB_REF_NAME}" != "hub" ]]; then
            echo "Manual hub plans must run from the hub branch." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_HUB_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/hub
        run: terraform init

      - name: Terraform validate
        working-directory: environments/hub
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/hub
        shell: bash
        run: |
          set +e
          terraform plan -input=false -out=tfplan -no-color 2>&1 | tee tfplan-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Hub Terraform Plan"
            echo
            echo '```text'
            tail -n 200 tfplan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Save plan summary
        if: success()
        working-directory: environments/hub
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hub-tfplan-${{ github.run_id }}
          path: |
            environments/hub/tfplan
            environments/hub/tfplan.txt
            environments/hub/tfplan-output.txt
          retention-days: 7
