name: Azure Platform Terraform Plan

on:
  pull_request:
    paths:
      - "environments/platform/**"
      - "modules/**"
      - ".github/workflows/azure-platform-plan.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_PLATFORM_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_CONNECTIVITY_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/platform
        run: terraform init

      - name: Terraform validate
        working-directory: environments/platform
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/platform
        run: terraform plan -input=false

