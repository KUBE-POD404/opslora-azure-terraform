name: Azure Prod Terraform Import

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Terraform root to import into."
        required: true
        type: choice
        options:
          - prod
          - prod-dr
      resource_address:
        description: "Terraform resource address, for example module.resource_groups.azurerm_resource_group.this[\"rg-opslora-prod-network-cin\"]."
        required: true
        type: string
      azure_resource_id:
        description: "Azure resource ID to import."
        required: true
        type: string
      confirm_import:
        description: "Type import-prod-resource to update Terraform state."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-prod-import-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  import:
    if: ${{ inputs.confirm_import == 'import-prod-resource' && github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    env:
      AZURE_PROD_CLIENT_ID: ${{ secrets.AZURE_PROD_CLIENT_ID }}
      AZURE_PROD_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_HUB_SUBSCRIPTION_ID: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      AZURE_AKS_SSH_PUBLIC_KEY: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      TF_VAR_hub_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
      TF_VAR_enable_rbac_assignments: ${{ vars.ENABLE_PROD_RBAC_ASSIGNMENTS || 'false' }}
      TF_VAR_rbac_group_object_ids: ${{ vars.PROD_RBAC_GROUP_OBJECT_IDS || '{}' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          missing=()
          for name in AZURE_PROD_CLIENT_ID AZURE_PROD_SUBSCRIPTION_ID AZURE_TENANT_ID AZURE_HUB_SUBSCRIPTION_ID AZURE_AKS_SSH_PUBLIC_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_PROD_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_PROD_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform init
        working-directory: environments/${{ inputs.target_environment }}
        run: terraform init

      - name: Terraform import
        working-directory: environments/${{ inputs.target_environment }}
        shell: bash
        run: |
          set +e
          terraform import -input=false -no-color \
            '${{ inputs.resource_address }}' \
            '${{ inputs.azure_resource_id }}' 2>&1 | tee tfimport-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Terraform Import (${{ inputs.target_environment }})"
            echo
            echo '```text'
            tail -n 200 tfimport-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Terraform plan after import
        if: success()
        working-directory: environments/${{ inputs.target_environment }}
        shell: bash
        run: |
          set +e
          terraform plan -input=false -no-color 2>&1 | tee tfplan-after-import-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Plan After Import (${{ inputs.target_environment }})"
            echo
            echo '```text'
            tail -n 200 tfplan-after-import-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload import artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-import-${{ inputs.target_environment }}-${{ github.run_id }}
          path: |
            environments/${{ inputs.target_environment }}/tfimport-output.txt
            environments/${{ inputs.target_environment }}/tfplan-after-import-output.txt
          retention-days: 14
