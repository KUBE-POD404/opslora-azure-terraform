name: Azure Prod Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "environments/prod/**"
      - "modules/**"
      - ".github/workflows/azure-prod-plan.yml"
      - ".github/workflows/terraform-pr-quality.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-prod-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: prod
    env:
      AZURE_PROD_CLIENT_ID: ${{ secrets.AZURE_PROD_CLIENT_ID }}
      AZURE_PROD_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_HUB_SUBSCRIPTION_ID: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      AZURE_AKS_SSH_PUBLIC_KEY: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      TF_VAR_hub_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
      TF_VAR_enable_rbac_assignments: ${{ vars.ENABLE_PROD_RBAC_ASSIGNMENTS || 'false' }}
      TF_VAR_rbac_group_object_ids: ${{ vars.PROD_RBAC_GROUP_OBJECT_IDS || '{}' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce prod plan branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "main" ]]; then
            echo "Prod plans are only allowed for PRs targeting main." >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Manual prod plans must run from main." >&2
            exit 1
          fi

      - name: Check required secrets
        shell: bash
        run: |
          missing=()
          for name in AZURE_PROD_CLIENT_ID AZURE_PROD_SUBSCRIPTION_ID AZURE_TENANT_ID AZURE_HUB_SUBSCRIPTION_ID AZURE_AKS_SSH_PUBLIC_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_PROD_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_PROD_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/prod
        run: terraform init

      - name: Terraform validate
        working-directory: environments/prod
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/prod
        shell: bash
        run: |
          set +e
          terraform plan -input=false -out=tfplan -no-color 2>&1 | tee tfplan-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Prod Terraform Plan"
            echo
            echo '```text'
            tail -n 200 tfplan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Save plan summary
        if: success()
        working-directory: environments/prod
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-tfplan-${{ github.run_id }}
          path: |
            environments/prod/tfplan
            environments/prod/tfplan.txt
            environments/prod/tfplan-output.txt
          retention-days: 14
