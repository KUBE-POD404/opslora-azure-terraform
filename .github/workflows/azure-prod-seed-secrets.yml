name: Azure Prod Seed Secrets

on:
  workflow_dispatch:
    inputs:
      rotate_runtime_secrets:
        description: "Rotate JWT/RabbitMQ secrets instead of preserving existing values."
        required: true
        type: boolean
        default: false
      api_url:
        description: "Public prod application URL"
        required: true
        default: "https://app.opslora.com"
      smtp_host:
        description: "SMTP host"
        required: true
        default: "smtp.hostinger.com"
      smtp_port:
        description: "SMTP port"
        required: true
        default: "587"
      smtp_user:
        description: "SMTP username"
        required: true
        default: "notification@opslora.com"
      smtp_starttls:
        description: "SMTP STARTTLS true/false"
        required: true
        default: "true"
      from_email:
        description: "Notification from email"
        required: true
        default: "notification@opslora.com"
      from_name:
        description: "Notification from name"
        required: true
        default: "Opslora"
      confirmation:
        description: "Type SEED_PROD_KEYVAULT to seed prod secrets."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-prod-seed-secrets
  cancel-in-progress: false

jobs:
  seed:
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirmation == 'SEED_PROD_KEYVAULT' }}
    runs-on: [self-hosted, linux, x64, opslora-prod, private-network]
    environment: prod
    env:
      AZURE_PROD_CLIENT_ID: ${{ secrets.AZURE_PROD_CLIENT_ID }}
      AZURE_PROD_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      PROD_SMTP_PASS: ${{ secrets.PROD_SMTP_PASS }}
      PROD_HERMES_API_KEY: ${{ secrets.PROD_HERMES_API_KEY }}
      PROD_VECTOR_API_KEY: ${{ secrets.PROD_VECTOR_API_KEY }}
      KEY_VAULT_NAME: kv-opslora-prod-cin-001
      MYSQL_DATABASE: opslora
      MYSQL_USER: opsloraadmin
      RABBIT_USER: opslora
      INPUT_API_URL: ${{ inputs.api_url }}
      INPUT_SMTP_HOST: ${{ inputs.smtp_host }}
      INPUT_SMTP_PORT: ${{ inputs.smtp_port }}
      INPUT_SMTP_USER: ${{ inputs.smtp_user }}
      INPUT_SMTP_STARTTLS: ${{ inputs.smtp_starttls }}
      INPUT_FROM_EMAIL: ${{ inputs.from_email }}
      INPUT_FROM_NAME: ${{ inputs.from_name }}
      LORA_AI_API_PREFIX: /api/v1
      LORA_AI_PRIMARY_AI_PROVIDER: hermes
      LORA_AI_ENABLE_AZURE_FOUNDRY_FALLBACK: ${{ vars.PROD_ENABLE_AZURE_FOUNDRY_FALLBACK || 'false' }}
      LORA_AI_HERMES_BASE_URL: ${{ vars.PROD_HERMES_BASE_URL || 'http://opslora-ai-gateway.opslora-app-ns.svc.cluster.local:8080' }}
      LORA_AI_HERMES_MODEL: ${{ vars.PROD_HERMES_MODEL || 'smollm2:135m' }}
      LORA_AI_HERMES_TIMEOUT_SECONDS: ${{ vars.PROD_HERMES_TIMEOUT_SECONDS || '20' }}
      LORA_AI_VECTOR_URL: ${{ vars.PROD_VECTOR_URL || 'http://qdrant.opslora-app-ns.svc.cluster.local:6333' }}
      LORA_AI_AZURE_FOUNDRY_ENDPOINT: ${{ vars.PROD_AZURE_AI_FOUNDRY_ENDPOINT || 'not-configured' }}
      LORA_AI_AZURE_FOUNDRY_DEPLOYMENT: ${{ vars.PROD_AZURE_AI_FOUNDRY_DEPLOYMENT || 'not-configured' }}
      LORA_AI_AZURE_FOUNDRY_TIMEOUT_SECONDS: ${{ vars.PROD_AZURE_FOUNDRY_TIMEOUT_SECONDS || '30' }}
      LORA_AI_AZURE_FOUNDRY_API_KEY: ${{ secrets.PROD_AZURE_AI_FOUNDRY_API_KEY || 'not-configured' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in AZURE_PROD_CLIENT_ID AZURE_PROD_SUBSCRIPTION_ID AZURE_TENANT_ID PROD_SMTP_PASS PROD_HERMES_API_KEY PROD_VECTOR_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub environment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_PROD_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_PROD_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: Seed prod Key Vault secrets
        working-directory: environments/prod
        shell: bash
        run: |
          set -euo pipefail
          terraform init -input=false
          MYSQL_HOST="$(terraform output -raw mysql_fqdn)"
          mysql_password="$(terraform output -raw mysql_administrator_password)"
          if [[ -z "$MYSQL_HOST" || -z "$mysql_password" ]]; then
            echo "Required Terraform MySQL outputs are missing." >&2
            exit 1
          fi
          echo "::add-mask::$mysql_password"
          echo "::add-mask::$PROD_SMTP_PASS"
          echo "::add-mask::$PROD_HERMES_API_KEY"
          echo "::add-mask::$PROD_VECTOR_API_KEY"

          existing_secret() {
            local name="$1"
            az keyvault secret show --vault-name "$KEY_VAULT_NAME" --name "$name" --query value -o tsv 2>/dev/null || true
          }

          existing_or_random() {
            local name="$1"
            local bytes="$2"
            local existing=""
            if [[ "${{ inputs.rotate_runtime_secrets }}" != "true" ]]; then
              existing="$(existing_secret "$name")"
            fi
            if [[ -n "$existing" ]]; then
              printf '%s' "$existing"
            else
              openssl rand -base64 "$bytes"
            fi
          }

          jwt_secret="$(existing_or_random opslora-prod-auth-jwt-secret-key 48)"
          rabbit_password="$(existing_or_random opslora-prod-rabbitmq-default-pass 32)"
          echo "::add-mask::$jwt_secret"
          echo "::add-mask::$rabbit_password"

          mysql_user_encoded="$(jq -nr --arg v "$MYSQL_USER" '$v|@uri')"
          mysql_password_encoded="$(jq -nr --arg v "$mysql_password" '$v|@uri')"
          rabbit_user_encoded="$(jq -nr --arg v "$RABBIT_USER" '$v|@uri')"
          rabbit_password_encoded="$(jq -nr --arg v "$rabbit_password" '$v|@uri')"
          database_url="mysql+pymysql://${mysql_user_encoded}:${mysql_password_encoded}@${MYSQL_HOST}:3306/${MYSQL_DATABASE}?ssl_ca=%2Fetc%2Fssl%2Fcerts%2Fca-certificates.crt"
          lora_database_url="mysql+pymysql://${mysql_user_encoded}:${mysql_password_encoded}@${MYSQL_HOST}:3306/${MYSQL_DATABASE}?ssl_ca=/etc/ssl/certs/ca-certificates.crt"
          rabbit_url="amqp://${rabbit_user_encoded}:${rabbit_password_encoded}@rabbitmq:5672//"

          set_secret() {
            local name="$1"
            local value="$2"
            local file
            file="$(mktemp)"
            printf '%s' "$value" > "$file"
            az keyvault secret set --vault-name "$KEY_VAULT_NAME" --name "$name" --file "$file" --only-show-errors --output none
            rm -f "$file"
          }

          for service in auth customer inventory order invoice payment; do
            set_secret "opslora-prod-${service}-database-url" "$database_url"
            set_secret "opslora-prod-${service}-jwt-secret-key" "$jwt_secret"
            set_secret "opslora-prod-${service}-environment" "production"
            set_secret "opslora-prod-${service}-access-token-expire-minutes" "15"
            set_secret "opslora-prod-${service}-api-url" "$INPUT_API_URL"
            set_secret "opslora-prod-${service}-rabbitmq-url" "$rabbit_url"
          done

          set_secret "opslora-prod-rabbitmq-default-user" "$RABBIT_USER"
          set_secret "opslora-prod-rabbitmq-default-pass" "$rabbit_password"
          set_secret "opslora-prod-notification-rabbitmq-url" "$rabbit_url"
          set_secret "opslora-prod-notification-smtp-host" "$INPUT_SMTP_HOST"
          set_secret "opslora-prod-notification-smtp-port" "$INPUT_SMTP_PORT"
          set_secret "opslora-prod-notification-smtp-user" "$INPUT_SMTP_USER"
          set_secret "opslora-prod-notification-smtp-pass" "$PROD_SMTP_PASS"
          set_secret "opslora-prod-notification-smtp-starttls" "$INPUT_SMTP_STARTTLS"
          set_secret "opslora-prod-notification-from-email" "$INPUT_FROM_EMAIL"
          set_secret "opslora-prod-notification-from-name" "$INPUT_FROM_NAME"

          set_secret "opslora-prod-lora-ai-database-url" "$lora_database_url"
          set_secret "opslora-prod-lora-ai-environment" "production"
          set_secret "opslora-prod-lora-ai-api-prefix" "$LORA_AI_API_PREFIX"
          set_secret "opslora-prod-lora-ai-primary-ai-provider" "$LORA_AI_PRIMARY_AI_PROVIDER"
          set_secret "opslora-prod-lora-ai-enable-azure-foundry-fallback" "$LORA_AI_ENABLE_AZURE_FOUNDRY_FALLBACK"
          set_secret "opslora-prod-lora-ai-hermes-base-url" "$LORA_AI_HERMES_BASE_URL"
          set_secret "opslora-prod-lora-ai-hermes-api-key" "$PROD_HERMES_API_KEY"
          set_secret "opslora-prod-lora-ai-hermes-model" "$LORA_AI_HERMES_MODEL"
          set_secret "opslora-prod-lora-ai-hermes-timeout-seconds" "$LORA_AI_HERMES_TIMEOUT_SECONDS"
          set_secret "opslora-prod-lora-ai-vector-url" "$LORA_AI_VECTOR_URL"
          set_secret "opslora-prod-lora-ai-vector-api-key" "$PROD_VECTOR_API_KEY"
          set_secret "opslora-prod-lora-ai-azure-foundry-endpoint" "$LORA_AI_AZURE_FOUNDRY_ENDPOINT"
          set_secret "opslora-prod-lora-ai-azure-foundry-api-key" "$LORA_AI_AZURE_FOUNDRY_API_KEY"
          set_secret "opslora-prod-lora-ai-azure-foundry-deployment" "$LORA_AI_AZURE_FOUNDRY_DEPLOYMENT"
          set_secret "opslora-prod-lora-ai-azure-foundry-timeout-seconds" "$LORA_AI_AZURE_FOUNDRY_TIMEOUT_SECONDS"

          {
            echo "## Azure Prod Secret Seed"
            echo
            echo "- Key Vault: \`$KEY_VAULT_NAME\`"
            echo "- API URL: \`$INPUT_API_URL\`"
            echo "- SMTP host: \`$INPUT_SMTP_HOST:$INPUT_SMTP_PORT\`"
            echo "- Runtime secret rotation: \`${{ inputs.rotate_runtime_secrets }}\`"
            echo "- Deployment: not performed by this workflow; Argo/GitOps remains authoritative."
          } >> "$GITHUB_STEP_SUMMARY"
