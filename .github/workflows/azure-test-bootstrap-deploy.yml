name: Azure Test Bootstrap and Helm Deploy

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "opslora-app-ns"
      app_base_url:
        description: "Public base URL for post-deploy smoke tests"
        required: true
        default: "http://app-test.opslora.com"

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-test-bootstrap-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: 2b46972f-ab16-4860-9fac-ac4811c15b20
      AZURE_TENANT_ID: 7f02300f-0f1b-4237-b981-c376377f394e
      AZURE_TEST_SUBSCRIPTION_ID: 94433754-e73d-429d-85c9-f4cf47043e04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-opslora-test-aks-cin
          cluster-name: aks-opslora-test-cin-001

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy Helm charts
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ github.event.inputs.namespace }}"
          git clone --branch azure/agic-application-gateway --depth 1 https://github.com/KUBE-POD404/opslora-helm-charts.git /tmp/opslora-helm-charts
          cd /tmp/opslora-helm-charts

          kubectl create namespace "${namespace}" --dry-run=client -o yaml | kubectl apply -f -

          helm upgrade --install rabbitmq-azure-test opslora-helm/infra/rabbitmq \
            --namespace "${namespace}" \
            -f opslora-helm/infra/rabbitmq/values.yaml \
            -f opslora-helm/infra/rabbitmq/values-azure-test.yaml \
            --wait --timeout 10m

          for release in auth customer inventory order invoice payment frontend notification; do
            kubectl delete job "${release}-migrate" -n "${namespace}" --ignore-not-found
            kubectl delete job "${release}-service-migrate" -n "${namespace}" --ignore-not-found
          done

          for chart in auth customer inventory order invoice payment frontend notification; do
            helm upgrade --install "${chart}" "opslora-helm/apps/${chart}" \
              --namespace "${namespace}" \
              -f "opslora-helm/apps/${chart}/values.yaml" \
              -f "opslora-helm/apps/${chart}/values-azure-test.yaml" \
              --wait --timeout 10m
          done

          kubectl get pods -n "${namespace}" -o wide

      - name: Verify rollout and smoke tests
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ github.event.inputs.namespace }}"
          base_url="${{ github.event.inputs.app_base_url }}"
          base_url="${base_url%/}"

          echo "## Azure Test deploy verification" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "Namespace: \`${namespace}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Base URL: \`${base_url}\`" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          echo "### Rollout status" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          deployments=$(kubectl get deployments -n "${namespace}" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}')
          if [ -z "$deployments" ]; then
            echo "No deployments found in namespace ${namespace}" >&2
            exit 1
          fi
          while IFS= read -r deployment; do
            [ -z "$deployment" ] && continue
            kubectl rollout status "deployment/${deployment}" -n "${namespace}" --timeout=5m
          done <<< "$deployments" 2>&1 | tee /tmp/rollout-status.txt
          cat /tmp/rollout-status.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          echo "### Pods" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "${namespace}" -o wide 2>&1 | tee /tmp/pods.txt
          cat /tmp/pods.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"

          declare -A endpoints=(
            [frontend]="/"
            [auth]="/api/v1/auth/health"
            [customer]="/api/v1/customers/health"
            [inventory]="/api/v1/inventory/health"
            [order]="/api/v1/orders/health"
            [invoice]="/api/v1/invoices/health"
            [payment]="/api/v1/payments/health"
          )

          echo "### HTTP smoke tests" >> "$GITHUB_STEP_SUMMARY"
          echo '| Service | URL | HTTP status |' >> "$GITHUB_STEP_SUMMARY"
          echo '| --- | --- | --- |' >> "$GITHUB_STEP_SUMMARY"

          failures=0
          for service in frontend auth customer inventory order invoice payment; do
            path="${endpoints[$service]}"
            url="${base_url}${path}"
            code=$(curl -L --connect-timeout 10 --max-time 30 -sS -o "/tmp/${service}-smoke.out" -w '%{http_code}' "$url" || true)
            echo "${service}: ${url} -> ${code}"
            echo "| ${service} | \`${url}\` | ${code} |" >> "$GITHUB_STEP_SUMMARY"
            if [[ ! "$code" =~ ^2[0-9][0-9]$ ]]; then
              echo "Smoke test failed for ${service}: ${url} returned ${code}" >&2
              failures=$((failures + 1))
            fi
          done

          if [ "$failures" -ne 0 ]; then
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "❌ ${failures} smoke test(s) failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Rollout and smoke tests passed." >> "$GITHUB_STEP_SUMMARY"
