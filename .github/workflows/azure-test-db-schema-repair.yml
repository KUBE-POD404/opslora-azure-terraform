name: Azure Test DB Schema Repair

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "opslora-app-ns"

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-test-db-schema-repair
  cancel-in-progress: false

jobs:
  repair:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: 2b46972f-ab16-4860-9fac-ac4811c15b20
      AZURE_TENANT_ID: 7f02300f-0f1b-4237-b981-c376377f394e
      AZURE_TEST_SUBSCRIPTION_ID: 94433754-e73d-429d-85c9-f4cf47043e04
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: rg-opslora-test-aks-cin
          cluster-name: aks-opslora-test-cin-001

      - name: Repair order and payment schema drift
        shell: bash
        run: |
          set -euo pipefail
          namespace="${{ github.event.inputs.namespace }}"

          run_python_in_pod() {
            local selector="$1"
            local name="$2"
            local script="$3"
            local pod
            pod=$(kubectl get pod -n "$namespace" -l "$selector" --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
            if [[ -z "$pod" ]]; then
              echo "No running pod for ${name} selector ${selector}" >&2
              exit 1
            fi
            echo "--- repairing ${name} via pod ${pod} ---"
            printf '%s\n' "$script" | kubectl exec -i -n "$namespace" "$pod" -- python -
          }

          order_script=$(cat <<'PYCODE'
          from sqlalchemy import create_engine, text
          from app.core.config import settings

          engine = create_engine(settings.database_url)
          table = "orders"
          columns = [
              ("customer_display_name", "VARCHAR(255) NULL"),
              ("customer_phone", "VARCHAR(50) NULL"),
              ("customer_type", "VARCHAR(30) NULL"),
              ("customer_tax_id", "VARCHAR(50) NULL"),
              ("customer_gstin", "VARCHAR(20) NULL"),
              ("customer_tax_registration_type", "VARCHAR(50) NULL"),
              ("customer_place_of_supply", "VARCHAR(100) NULL"),
              ("billing_address_line1", "VARCHAR(255) NULL"),
              ("billing_address_line2", "VARCHAR(255) NULL"),
              ("billing_city", "VARCHAR(100) NULL"),
              ("billing_state", "VARCHAR(100) NULL"),
              ("billing_postal_code", "VARCHAR(30) NULL"),
              ("billing_country", "VARCHAR(100) NULL"),
              ("shipping_same_as_billing", "BOOL NULL"),
              ("shipping_address_line1", "VARCHAR(255) NULL"),
              ("shipping_address_line2", "VARCHAR(255) NULL"),
              ("shipping_city", "VARCHAR(100) NULL"),
              ("shipping_state", "VARCHAR(100) NULL"),
              ("shipping_postal_code", "VARCHAR(30) NULL"),
              ("shipping_country", "VARCHAR(100) NULL"),
              ("payment_terms_days", "INT NULL"),
          ]
          with engine.begin() as conn:
              existing = {row[0] for row in conn.execute(text("SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = :table"), {"table": table})}
              for name, ddl in columns:
                  if name not in existing:
                      print(f"adding {table}.{name}")
                      conn.execute(text(f"ALTER TABLE {table} ADD COLUMN {name} {ddl}"))
                  else:
                      print(f"exists {table}.{name}")
          print("order schema repair complete")
          PYCODE
          )

          payment_script=$(cat <<'PYCODE'
          from sqlalchemy import create_engine, text
          from app.core.config import settings

          engine = create_engine(settings.database_url)
          with engine.begin() as conn:
              existing = {row[0] for row in conn.execute(text("SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'payments'"))}
              columns = [
                  ("customer_id", "INT NULL"),
                  ("currency", "VARCHAR(3) NOT NULL DEFAULT 'INR'"),
                  ("payment_type", "VARCHAR(20) NOT NULL DEFAULT 'MANUAL'"),
                  ("status", "VARCHAR(30) NOT NULL DEFAULT 'SUCCEEDED'"),
                  ("reference_number", "VARCHAR(100) NULL"),
                  ("gateway_provider", "VARCHAR(50) NULL"),
                  ("gateway_order_id", "VARCHAR(150) NULL"),
                  ("gateway_payment_id", "VARCHAR(150) NULL"),
                  ("gateway_signature", "VARCHAR(255) NULL"),
                  ("failure_reason", "TEXT NULL"),
                  ("metadata_json", "TEXT NULL"),
                  ("received_by_user_id", "INT NULL"),
                  ("created_at", "DATETIME NULL"),
                  ("updated_at", "DATETIME NULL"),
              ]
              for name, ddl in columns:
                  if name not in existing:
                      print(f"adding payments.{name}")
                      conn.execute(text(f"ALTER TABLE payments ADD COLUMN {name} {ddl}"))
                  else:
                      print(f"exists payments.{name}")
              indexes = {row[0] for row in conn.execute(text("SELECT INDEX_NAME FROM INFORMATION_SCHEMA.STATISTICS WHERE TABLE_SCHEMA = DATABASE() AND TABLE_NAME = 'payments'"))}
              if "ix_payments_customer_id" not in indexes:
                  print("adding ix_payments_customer_id")
                  conn.execute(text("CREATE INDEX ix_payments_customer_id ON payments (customer_id)"))
              else:
                  print("exists ix_payments_customer_id")

              tables = {row[0] for row in conn.execute(text("SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA = DATABASE()"))}
              if "payment_transactions" not in tables:
                  print("creating payment_transactions")
                  conn.execute(text("""
                      CREATE TABLE payment_transactions (
                          id INT NOT NULL AUTO_INCREMENT,
                          organization_id INT NOT NULL,
                          payment_id INT NULL,
                          invoice_id INT NOT NULL,
                          event_type VARCHAR(40) NOT NULL,
                          status VARCHAR(30) NOT NULL,
                          amount NUMERIC(10, 2) NULL,
                          currency VARCHAR(3) NOT NULL DEFAULT 'INR',
                          provider VARCHAR(50) NULL,
                          provider_event_id VARCHAR(150) NULL,
                          raw_payload_json TEXT NULL,
                          created_at DATETIME NULL,
                          PRIMARY KEY (id),
                          CONSTRAINT check_payment_transaction_event_type CHECK (event_type IN ('CREATED','AUTHORIZED','CAPTURED','FAILED','REFUND_CREATED','REFUNDED','WEBHOOK_RECEIVED')),
                          CONSTRAINT check_payment_transaction_status CHECK (status IN ('PENDING','PROCESSING','SUCCEEDED','FAILED','CANCELLED','REFUNDED','PARTIALLY_REFUNDED'))
                      )
                  """))
                  conn.execute(text("CREATE INDEX ix_payment_transactions_id ON payment_transactions (id)"))
                  conn.execute(text("CREATE INDEX ix_payment_transactions_invoice_id ON payment_transactions (invoice_id)"))
                  conn.execute(text("CREATE INDEX ix_payment_transactions_organization_id ON payment_transactions (organization_id)"))
                  conn.execute(text("CREATE INDEX ix_payment_transactions_payment_id ON payment_transactions (payment_id)"))
              else:
                  print("exists payment_transactions")

              tables = {row[0] for row in conn.execute(text("SELECT TABLE_NAME FROM INFORMATION_SCHEMA.TABLES WHERE TABLE_SCHEMA = DATABASE()"))}
              if "refunds" not in tables:
                  print("creating refunds")
                  conn.execute(text("""
                      CREATE TABLE refunds (
                          id INT NOT NULL AUTO_INCREMENT,
                          organization_id INT NOT NULL,
                          payment_id INT NULL,
                          invoice_id INT NOT NULL,
                          amount NUMERIC(10, 2) NOT NULL,
                          currency VARCHAR(3) NOT NULL DEFAULT 'INR',
                          status VARCHAR(30) NOT NULL DEFAULT 'SUCCEEDED',
                          reason TEXT NULL,
                          gateway_refund_id VARCHAR(150) NULL,
                          refunded_by_user_id INT NULL,
                          refunded_at DATETIME NULL,
                          created_at DATETIME NULL,
                          PRIMARY KEY (id),
                          CONSTRAINT check_refund_amount_positive CHECK (amount > 0),
                          CONSTRAINT check_refund_status CHECK (status IN ('PENDING','PROCESSING','SUCCEEDED','FAILED','CANCELLED'))
                      )
                  """))
                  conn.execute(text("CREATE INDEX ix_refunds_id ON refunds (id)"))
                  conn.execute(text("CREATE INDEX ix_refunds_invoice_id ON refunds (invoice_id)"))
                  conn.execute(text("CREATE INDEX ix_refunds_organization_id ON refunds (organization_id)"))
                  conn.execute(text("CREATE INDEX ix_refunds_payment_id ON refunds (payment_id)"))
              else:
                  print("exists refunds")
          print("payment schema repair complete")
          PYCODE
          )

          run_python_in_pod 'app.kubernetes.io/instance=order' 'order' "$order_script"
          run_python_in_pod 'app.kubernetes.io/instance=payment' 'payment' "$payment_script"
