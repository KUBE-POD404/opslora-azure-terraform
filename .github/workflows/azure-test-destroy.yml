name: Azure Test Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type destroy-test to destroy the test Terraform root."
        required: true
        type: string
      second_confirm:
        description: "Type delete-test-terraform-state-resources to acknowledge this destroys Azure resources managed by Terraform."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-test-destroy
  cancel-in-progress: false

jobs:
  destroy:
    if: ${{ (github.ref == 'refs/heads/test' || github.ref == 'refs/heads/azure/hub-test-foundation') && inputs.confirm_destroy == 'destroy-test' && inputs.second_confirm == 'delete-test-terraform-state-resources' }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_subscription_id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}
      TF_VAR_hub_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
      TF_IN_AUTOMATION: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce test branch and explicit destroy confirmations
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" != "test" && "$GITHUB_REF_NAME" != "azure/hub-test-foundation" ]]; then
            echo "test destroy can only run from the test or azure/hub-test-foundation branch." >&2
            exit 1
          fi
          if [[ "${{ inputs.confirm_destroy }}" != "destroy-test" ]]; then
            echo "confirm_destroy must be destroy-test" >&2
            exit 1
          fi
          if [[ "${{ inputs.second_confirm }}" != "delete-test-terraform-state-resources" ]]; then
            echo "second_confirm must be delete-test-terraform-state-resources" >&2
            exit 1
          fi
          echo "Destroy confirmation accepted for test."

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/test
        run: terraform init

      - name: Terraform validate
        working-directory: environments/test
        run: terraform validate

      - name: Terraform destroy plan
        working-directory: environments/test
        shell: bash
        run: |
          set +e
          terraform plan -destroy -input=false -out=tfdestroy.plan -no-color 2>&1 | tee tfdestroy-plan-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Test Terraform Destroy Plan"
            echo
            echo '```text'
            tail -n 240 tfdestroy-plan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Terraform destroy apply
        working-directory: environments/test
        shell: bash
        run: |
          set +e
          terraform apply -input=false -auto-approve tfdestroy.plan -no-color 2>&1 | tee tfdestroy-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Test Terraform Destroy Apply"
            echo
            echo '```text'
            tail -n 240 tfdestroy-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Upload destroy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-tfdestroy-${{ github.run_id }}
          path: |
            environments/test/tfdestroy-plan-output.txt
            environments/test/tfdestroy-output.txt
          retention-days: 14
