name: Azure Test Federated Credential Maintenance

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "list"
        type: choice
        options: ["list", "ensure"]
      repo_name:
        description: "Repository name under KUBE-POD404 for ensure action"
        required: false
        default: "opslora-lora-ai-service"
        type: string
      environment_name:
        description: "GitHub environment name used in the OIDC subject"
        required: false
        default: "azure-test"
        type: string
      credential_name:
        description: "Federated credential name for ensure action"
        required: false
        default: "opslora-lora-ai-service-azure-test"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-test-federated-credential-maintenance
  cancel-in-progress: false

jobs:
  maintain:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: ubuntu-latest
    steps:
      - name: Azure login test identity
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Maintain federated credentials
        shell: bash
        env:
          ACTION: ${{ inputs.action }}
          REPO_NAME: ${{ inputs.repo_name }}
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          CREDENTIAL_NAME: ${{ inputs.credential_name }}
          AZURE_TEST_CLIENT_ID: ${{ secrets.AZURE_TEST_CLIENT_ID }}
        run: |
          set -euo pipefail
          subject="repo:KUBE-POD404/${REPO_NAME}:environment:${ENVIRONMENT_NAME}"
          echo "Target subject: ${subject}"
          echo "Listing existing federated credentials for test app"
          az ad app federated-credential list --id "${AZURE_TEST_CLIENT_ID}" \
            --query '[].{name:name,subject:subject,issuer:issuer,audiences:audiences}' -o table
          count=$(az ad app federated-credential list --id "${AZURE_TEST_CLIENT_ID}" --query 'length(@)' -o tsv)
          echo "Existing federated credential count: ${count}"
          if [[ "${ACTION}" == "list" ]]; then
            exit 0
          fi
          exists=$(az ad app federated-credential list --id "${AZURE_TEST_CLIENT_ID}" \
            --query "[?subject=='${subject}'] | length(@)" -o tsv)
          if [[ "${exists}" != "0" ]]; then
            echo "Federated credential already exists for ${subject}"
            exit 0
          fi
          if [[ "${count}" -ge 20 ]]; then
            echo "Cannot add ${subject}: Azure app already has ${count} federated credentials (limit is 20)." >&2
            echo "Remove or consolidate a stale federated credential first." >&2
            exit 2
          fi
          cat > /tmp/federated-credential.json <<JSON
          {
            "name": "${CREDENTIAL_NAME}",
            "issuer": "https://token.actions.githubusercontent.com",
            "subject": "${subject}",
            "audiences": ["api://AzureADTokenExchange"],
            "description": "GitHub Actions OIDC for ${REPO_NAME} ${ENVIRONMENT_NAME}"
          }
          JSON
          az ad app federated-credential create \
            --id "${AZURE_TEST_CLIENT_ID}" \
            --parameters /tmp/federated-credential.json
          echo "Created federated credential for ${subject}"
