name: Azure Test Terraform Plan

on:
  pull_request:
    branches:
      - test
    paths:
      - "environments/test/**"
      - "modules/**"
      - ".github/workflows/azure-test-plan.yml"
      - ".github/workflows/terraform-pr-quality.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-test-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/test' }}
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_subscription_id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}
      TF_VAR_hub_subscription_id: ${{ secrets.AZURE_HUB_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.AZURE_AKS_SSH_PUBLIC_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enforce test plan branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "test" ]]; then
            echo "Test plans are only allowed for PRs targeting test." >&2
            exit 1
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${GITHUB_REF_NAME}" != "test" ]]; then
            echo "Manual test plans must run from the test branch." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: environments/test
        run: terraform init

      - name: Terraform validate
        working-directory: environments/test
        run: terraform validate

      - name: Terraform plan
        working-directory: environments/test
        shell: bash
        run: |
          set +e
          terraform plan -input=false -out=tfplan -no-color 2>&1 | tee tfplan-output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## Test Terraform Plan"
            echo
            echo '```text'
            tail -n 200 tfplan-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$status"

      - name: Save plan summary
        if: success()
        working-directory: environments/test
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-tfplan-${{ github.run_id }}
          path: |
            environments/test/tfplan
            environments/test/tfplan.txt
            environments/test/tfplan-output.txt
          retention-days: 7
