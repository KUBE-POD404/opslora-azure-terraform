name: Azure Test Seed Secrets

on:
  workflow_dispatch:
    inputs:
      rotate_runtime_secrets:
        description: "Rotate JWT and RabbitMQ secrets instead of preserving existing values."
        required: true
        type: boolean
        default: false
      api_url:
        description: "Public test application URL"
        required: true
        default: "https://app-test.opslora.com"
      smtp_host:
        description: "SMTP host"
        required: true
        default: "smtp.hostinger.com"
      smtp_port:
        description: "SMTP port"
        required: true
        default: "587"
      smtp_user:
        description: "SMTP username"
        required: true
        default: "notification@opslora.com"
      smtp_starttls:
        description: "SMTP STARTTLS true/false"
        required: true
        default: "true"
      from_email:
        description: "Notification from email"
        required: true
        default: "notification@opslora.com"
      from_name:
        description: "Notification from name"
        required: true
        default: "Opslora"

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-test-seed-secrets
  cancel-in-progress: false

jobs:
  seed:
    if: ${{ github.ref == 'refs/heads/azure/hub-test-foundation' }}
    runs-on: [self-hosted, linux, x64, opslora-test, private-network]
    environment: test
    env:
      AZURE_TEST_CLIENT_ID: ${{ secrets.AZURE_TEST_CLIENT_ID }}
      AZURE_TEST_SUBSCRIPTION_ID: ${{ secrets.AZURE_TEST_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      TEST_SMTP_PASS: ${{ secrets.TEST_SMTP_PASS }}
      TEST_HERMES_API_KEY: ${{ secrets.TEST_HERMES_API_KEY }}
      TEST_VECTOR_API_KEY: ${{ secrets.TEST_VECTOR_API_KEY }}
      TEST_HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.TEST_HEADLAMP_OIDC_CLIENT_SECRET }}
      KEY_VAULT_NAME: kv-opslora-test-cin-001
      KEY_VAULT_RG: rg-opslora-test-security-cin
      TFSTATE_ACCOUNT: stopsloratfstatecin001
      TFSTATE_CONTAINER: tfstate
      TFSTATE_BLOB: test/terraform.tfstate
      MYSQL_HOST: mysql-opslora-test-cin-001.mysql.database.azure.com
      MYSQL_DATABASE: opslora
      MYSQL_USER: opsloraadmin
      RABBIT_USER: opslora
      INPUT_API_URL: ${{ inputs.api_url }}
      INPUT_SMTP_HOST: ${{ inputs.smtp_host }}
      INPUT_SMTP_PORT: ${{ inputs.smtp_port }}
      INPUT_SMTP_USER: ${{ inputs.smtp_user }}
      INPUT_SMTP_STARTTLS: ${{ inputs.smtp_starttls }}
      INPUT_FROM_EMAIL: ${{ inputs.from_email }}
      INPUT_FROM_NAME: ${{ inputs.from_name }}
      LORA_AI_DATABASE_URL: sqlite:////data/lora_ai.db
      LORA_AI_API_PREFIX: /api/v1
      LORA_AI_PRIMARY_AI_PROVIDER: ollama
      LORA_AI_ENABLE_AZURE_FOUNDRY_FALLBACK: ${{ vars.TEST_ENABLE_AZURE_FOUNDRY_FALLBACK || 'false' }}
      LORA_AI_HERMES_BASE_URL: ${{ vars.TEST_HERMES_BASE_URL || 'http://opslora-ai-gateway.opslora-app-ns.svc.cluster.local:8080' }}
      LORA_AI_HERMES_MODEL: ${{ vars.TEST_HERMES_MODEL || 'smollm2:135m' }}
      LORA_AI_HERMES_TIMEOUT_SECONDS: ${{ vars.TEST_HERMES_TIMEOUT_SECONDS || '20' }}
      LORA_AI_VECTOR_URL: ${{ vars.TEST_VECTOR_URL || 'http://qdrant.opslora-app-ns.svc.cluster.local:6333' }}
      LORA_AI_AZURE_FOUNDRY_ENDPOINT: ${{ vars.TEST_AZURE_AI_FOUNDRY_ENDPOINT || 'not-configured' }}
      LORA_AI_AZURE_FOUNDRY_DEPLOYMENT: ${{ vars.TEST_AZURE_AI_FOUNDRY_DEPLOYMENT || 'not-configured' }}
      LORA_AI_AZURE_FOUNDRY_TIMEOUT_SECONDS: ${{ vars.TEST_AZURE_AI_FOUNDRY_TIMEOUT_SECONDS || '30' }}
      LORA_AI_AZURE_FOUNDRY_API_KEY: ${{ secrets.TEST_AZURE_AI_FOUNDRY_API_KEY || 'not-configured' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        shell: bash
        run: |
          missing=()
          for name in AZURE_TEST_CLIENT_ID AZURE_TEST_SUBSCRIPTION_ID AZURE_TENANT_ID TEST_SMTP_PASS TEST_HERMES_API_KEY TEST_VECTOR_API_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_TEST_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_TEST_SUBSCRIPTION_ID }}

      - name: Seed Key Vault secrets
        shell: bash
        run: |
          set -euo pipefail

          az storage blob download \
            --account-name "$TFSTATE_ACCOUNT" \
            --container-name "$TFSTATE_CONTAINER" \
            --name "$TFSTATE_BLOB" \
            --file /tmp/opslora-test.tfstate \
            --auth-mode login \
            --only-show-errors \
            --output none

          mysql_password="$(jq -r '.resources[] | select(.module=="module.mysql" and .type=="random_password" and .name=="admin") | .instances[0].attributes.result' /tmp/opslora-test.tfstate)"
          if [[ -z "$mysql_password" || "$mysql_password" == "null" ]]; then
            echo "MySQL password was not found in Terraform state." >&2
            exit 1
          fi
          echo "::add-mask::$mysql_password"

          existing_secret() {
            local name="$1"
            az keyvault secret show \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$name" \
              --query value \
              -o tsv 2>/dev/null || true
          }

          existing_or_random() {
            local name="$1"
            local bytes="$2"
            local existing=""
            if [[ "${{ inputs.rotate_runtime_secrets }}" != "true" ]]; then
              existing="$(existing_secret "$name")"
            fi
            if [[ -n "$existing" ]]; then
              printf '%s' "$existing"
            else
              openssl rand -base64 "$bytes"
            fi
          }

          jwt_secret="$(existing_or_random opslora-test-auth-jwt-secret-key 48)"
          rabbit_password="$(existing_or_random opslora-test-rabbitmq-default-pass 32)"
          echo "::add-mask::$jwt_secret"
          echo "::add-mask::$rabbit_password"
          echo "::add-mask::$TEST_SMTP_PASS"

          mysql_user_encoded="$(jq -nr --arg v "$MYSQL_USER" '$v|@uri')"
          mysql_password_encoded="$(jq -nr --arg v "$mysql_password" '$v|@uri')"
          rabbit_user_encoded="$(jq -nr --arg v "$RABBIT_USER" '$v|@uri')"
          rabbit_password_encoded="$(jq -nr --arg v "$rabbit_password" '$v|@uri')"
          database_url="mysql+pymysql://${mysql_user_encoded}:${mysql_password_encoded}@${MYSQL_HOST}:3306/${MYSQL_DATABASE}?ssl_ca=%2Fetc%2Fssl%2Fcerts%2Fca-certificates.crt"
          rabbit_url="amqp://${rabbit_user_encoded}:${rabbit_password_encoded}@rabbitmq:5672//"

          set_secret() {
            local name="$1"
            local value="$2"
            local file
            file="$(mktemp)"
            printf '%s' "$value" > "$file"
            az keyvault secret set \
              --vault-name "$KEY_VAULT_NAME" \
              --name "$name" \
              --file "$file" \
              --only-show-errors \
              --output none
            rm -f "$file"
          }

          for service in auth customer inventory order invoice payment; do
            set_secret "opslora-test-${service}-database-url" "$database_url"
            set_secret "opslora-test-${service}-jwt-secret-key" "$jwt_secret"
            set_secret "opslora-test-${service}-environment" "test"
            set_secret "opslora-test-${service}-access-token-expire-minutes" "15"
            set_secret "opslora-test-${service}-api-url" "$INPUT_API_URL"
            set_secret "opslora-test-${service}-rabbitmq-url" "$rabbit_url"
          done

          set_secret "opslora-test-rabbitmq-default-user" "$RABBIT_USER"
          set_secret "opslora-test-rabbitmq-default-pass" "$rabbit_password"
          set_secret "opslora-test-notification-rabbitmq-url" "$rabbit_url"
          set_secret "opslora-test-notification-smtp-host" "$INPUT_SMTP_HOST"
          set_secret "opslora-test-notification-smtp-port" "$INPUT_SMTP_PORT"
          set_secret "opslora-test-notification-smtp-user" "$INPUT_SMTP_USER"
          set_secret "opslora-test-notification-smtp-pass" "$TEST_SMTP_PASS"
          set_secret "opslora-test-notification-smtp-starttls" "$INPUT_SMTP_STARTTLS"
          set_secret "opslora-test-notification-from-email" "$INPUT_FROM_EMAIL"
          set_secret "opslora-test-notification-from-name" "$INPUT_FROM_NAME"

          if [[ -n "${TEST_HEADLAMP_OIDC_CLIENT_SECRET:-}" ]]; then
            set_secret "opslora-test-headlamp-oidc-client-secret" "$TEST_HEADLAMP_OIDC_CLIENT_SECRET"
          else
            echo "::warning title=Missing optional Headlamp OIDC secret::Set TEST_HEADLAMP_OIDC_CLIENT_SECRET after rotating the Headlamp OIDC client secret to seed opslora-test-headlamp-oidc-client-secret."
          fi

          set_secret "opslora-test-lora-ai-database-url" "$LORA_AI_DATABASE_URL"
          set_secret "opslora-test-lora-ai-environment" "test"
          set_secret "opslora-test-lora-ai-api-prefix" "$LORA_AI_API_PREFIX"
          set_secret "opslora-test-lora-ai-primary-ai-provider" "$LORA_AI_PRIMARY_AI_PROVIDER"
          set_secret "opslora-test-lora-ai-enable-azure-foundry-fallback" "$LORA_AI_ENABLE_AZURE_FOUNDRY_FALLBACK"
          set_secret "opslora-test-lora-ai-hermes-base-url" "$LORA_AI_HERMES_BASE_URL"
          set_secret "opslora-test-lora-ai-hermes-api-key" "$TEST_HERMES_API_KEY"
          set_secret "opslora-test-lora-ai-hermes-model" "$LORA_AI_HERMES_MODEL"
          set_secret "opslora-test-lora-ai-hermes-timeout-seconds" "$LORA_AI_HERMES_TIMEOUT_SECONDS"
          set_secret "opslora-test-lora-ai-vector-url" "$LORA_AI_VECTOR_URL"
          set_secret "opslora-test-lora-ai-vector-api-key" "$TEST_VECTOR_API_KEY"
          set_secret "opslora-test-lora-ai-azure-foundry-endpoint" "$LORA_AI_AZURE_FOUNDRY_ENDPOINT"
          set_secret "opslora-test-lora-ai-azure-foundry-api-key" "$LORA_AI_AZURE_FOUNDRY_API_KEY"
          set_secret "opslora-test-lora-ai-azure-foundry-deployment" "$LORA_AI_AZURE_FOUNDRY_DEPLOYMENT"
          set_secret "opslora-test-lora-ai-azure-foundry-timeout-seconds" "$LORA_AI_AZURE_FOUNDRY_TIMEOUT_SECONDS"

          {
            echo "## Azure Test Secret Seed"
            echo
            echo "- Key Vault: \`$KEY_VAULT_NAME\`"
            echo "- API URL: \`$INPUT_API_URL\`"
            echo "- SMTP host: \`$INPUT_SMTP_HOST:$INPUT_SMTP_PORT\`"
            echo "- Runtime secret rotation: \`${{ inputs.rotate_runtime_secrets }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
